<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milestone 2</title>
</head>
<body>
<h1><span id="user">Loading...</span> has reached milestone 2!</h1>
<p>Container ID: <span id="container-id">Loading...</span></p>
<script>
    // fetch user from API
    fetch("http://localhost:30800/user")
        .then((res) => res.json())
        .then((data) => {
            const user = data.name;
            document.getElementById("user").innerText = user;
        });

    // fetch container id from API
    fetch("http://localhost:30800/container-id")
        .then((res) => res.json())
        .then((data) => {
            document.getElementById("container-id").innerText = data.container_id;
        });
</script>
</body>
</html>
